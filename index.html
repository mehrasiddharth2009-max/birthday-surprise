<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

<!-- Loading -->
<section id="loadingScreen" class="screen active">
    <div class="loader"></div>
    <h2>Preparing Something Special ✨️</h2>
    
</section>

<!-- Light Screen -->
<section id="lightScreen" class="screen">

    <div class="fairyLights">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <h1 id="birthdayTitle">Happy Birthday </h1>

    <button id="lightBtn">
        Turn On Lights ✨
    </button>
<!-- Gift Box -->
<div id="giftBox" class="giftBox">
    <div class="gift-lid"></div>
    <div class="gift-body"></div>
</div>
<!-- Cake -->
<div id="cake" class="cake">

    <div class="cake-top"></div>

    <div class="cake-middle"></div>

    <div class="cake-bottom"></div>

    <div class="candle">
        <div class="flame"></div>
    </div>
    
    <div class="cake-slice" id="cakeSlice"></div>

</div>
    <!-- Knife -->
<div id="knife" class="knife">
    🔪
</div>

<button id="cutBtn">
    Cut Cake 🎂
    <button id="continueBtn">
    Continue ✨️
    </button>
</button>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
